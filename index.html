    <title>Physics Tracker - ফোন লগইন</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}body{background:#0a0c12;color:#fff;padding:20px}.container{max-width:500px;margin:auto;background:#1e2a3a;border-radius:32px;padding:24px}.input-group{margin:16px 0}input,button{width:100%;padding:12px;border-radius:40px;border:none}input{background:#2c3e50;color:#fff}button{background:#2ecc71;color:#000;font-weight:bold;cursor:pointer}.hidden{display:none}
    </style>
</head>
<body>
<div id="loginUI" class="container">
    <h2>📞 ফোন নম্বর দিন</h2>
    <input type="tel" id="phone" placeholder="01xxxxxxxxx বা 018xxxxxxxx"><br>
    <button id="sendOtp">OTP পাঠান</button>
    <div id="otpDiv" class="hidden">
        <input type="text" id="otp" placeholder="6 ডিজিট OTP"><br>
        <button id="verifyOtp">লগইন করুন</button>
    </div>
    <div id="nameDiv" class="hidden">
        <input type="text" id="fullName" placeholder="আপনার নাম"><br>
        <button id="saveName">নাম সংরক্ষণ করুন</button>
    </div>
    <div id="msg"></div>
</div>
<div id="appUI" class="hidden">
    <h2>🎓 স্বাগতম, <span id="userName"></span></h2>
    <button id="logoutBtn">লগআউট</button>
    <div id="videoList"></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDTnTStePWbfrdWd8vttQ5DfPRglTWqnAw",
        authDomain: "physics-tracker-ce3ff.firebaseapp.com",
        projectId: "physics-tracker-ce3ff",
        storageBucket: "physics-tracker-ce3ff.firebasestorage.app",
        messagingSenderId: "683659010664",
        appId: "1:683659010664:web:40981f93aa9d88f7c651dd"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let confirmation = null;
    let currentUser = null;
    
    function normalizePhone(p) {
        let x = p.trim().replace(/\s/g,'');
        if(x.match(/^01[3-9]\d{8}$/)) return '+88'+x;
        if(x.match(/^\+8801[3-9]\d{8}$/)) return x;
        if(x.match(/^8801[3-9]\d{8}$/)) return '+'+x;
        return null;
    }
    
    document.getElementById('sendOtp').onclick = async () => {
        let raw = document.getElementById('phone').value;
        let phone = normalizePhone(raw);
        if(!phone) { document.getElementById('msg').innerText = 'সঠিক নম্বর দিন (017xxxxxxxx)'; return; }
        document.getElementById('msg').innerText = 'OTP পাঠানো হচ্ছে...';
        try {
            let recaptcha = new firebase.auth.RecaptchaVerifier('sendOtp', {size:'invisible'});
            confirmation = await auth.signInWithPhoneNumber(phone, recaptcha);
            document.getElementById('otpDiv').classList.remove('hidden');
            document.getElementById('msg').innerText = 'OTP এসেছে? কোড দিন।';
        } catch(e) { document.getElementById('msg').innerText = e.message; }
    };
    
    document.getElementById('verifyOtp').onclick = async () => {
        let code = document.getElementById('otp').value;
        if(!code) return;
        try {
            let result = await confirmation.confirm(code);
            let user = result.user;
            let doc = await db.collection('users').doc(user.uid).get();
            if(doc.exists) {
                currentUser = user;
                showApp(doc.data().name, doc.data().role);
            } else {
                currentUser = user;
                document.getElementById('nameDiv').classList.remove('hidden');
                document.getElementById('msg').innerText = 'নাম দিন';
            }
        } catch(e) { document.getElementById('msg').innerText = e.message; }
    };
    
    document.getElementById('saveName').onclick = async () => {
        let name = document.getElementById('fullName').value.trim();
        if(!name) return;
        await db.collection('users').doc(currentUser.uid).set({ name: name, role: 'user', phone: currentUser.phoneNumber });
        showApp(name, 'user');
    };
    
    function showApp(name, role) {
        document.getElementById('loginUI').classList.add('hidden');
        document.getElementById('appUI').classList.remove('hidden');
        document.getElementById('userName').innerText = name;
        if(role === 'admin') alert('আপনি অ্যাডমিন। সব ইউজার দেখতে পাবেন।');
        // এখানে ভিডিও লোড করার ফাংশন লাগবে (আগের মতো)
        document.getElementById('videoList').innerHTML = '<p>ভিডিও লোড করতে সিঙ্ক বাটন লাগবে। উপরের কোডে সেটা যোগ করতে হবে। তবে এখন টেস্ট লগইন ওটিপি কাজ করছে।</p>';
    }
    
    document.getElementById('logoutBtn').onclick = () => { auth.signOut(); location.reload(); };
</script>
</body>

    document.getElementById('logoutBtn').onclick = () => { auth.signOut(); location.reload(); };
</script>
