<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Physics Tracker | জেমিনাই এআই + সব ফিচার</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        :root {
            --bg-body: #f5f7fb;
            --card-bg: #ffffff;
            --text-primary: #1a2c3e;
            --text-secondary: #5a6e7c;
            --border-light: #eef2f6;
            --border-btn: #cbd5e1;
            --progress-bg: #e2e8f0;
            --progress-fill: #2ecc71;
            --accent: #1e4a6e;
            --btn-hover: #f1f5f9;
            --error-bg: #fee2e2;
            --error-text: #b91c1c;
            --player-bg: #0a1a24;
            --player-text: white;
        }
        body.dark {
            --bg-body: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border-light: #2c2c2c;
            --border-btn: #3e3e3e;
            --progress-bg: #333333;
            --progress-fill: #cccccc;
            --accent: #888888;
            --btn-hover: #2c2c2c;
            --error-bg: #3a1a1a;
            --error-text: #ff8888;
            --player-bg: #000000;
            --player-text: #dddddd;
        }
        * { margin:0; padding:0; box-sizing:border-box; transition:background 0.2s, border 0.2s, color 0.2s; }
        body { background:var(--bg-body); font-family:'Inter','Noto Sans Bengali',sans-serif; color:var(--text-primary); }
        .container { max-width:1400px; margin:0 auto; padding:1.5rem; }
        /* হ্যামবার্গার */
        .hamburger { position:fixed; top:20px; left:20px; z-index:1001; background:var(--accent); border:none; width:48px; height:48px; border-radius:50%; cursor:pointer; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:6px; }
        .hamburger span { width:24px; height:3px; background:white; border-radius:3px; }
        .drawer { position:fixed; top:0; left:-340px; width:340px; height:100%; background:var(--card-bg); z-index:1002; overflow-y:auto; transition:left 0.3s; padding:20px; border-right:1px solid var(--border-light); }
        .drawer.open { left:0; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:none; }
        .overlay.active { display:block; }
        .drawer-header { display:flex; justify-content:flex-end; margin-bottom:20px; }
        .close-drawer { background:none; border:none; font-size:28px; cursor:pointer; color:var(--text-primary); }
        .main-content { padding-left:60px; }
        .top-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:2rem; border-bottom:2px solid var(--border-light); padding-bottom:0.5rem; }
        .logo h1 { font-size:1.6rem; background:linear-gradient(135deg, var(--accent), #2c6e9e); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .btn { padding:0.5rem 1.2rem; border-radius:40px; font-weight:500; cursor:pointer; border:1px solid var(--border-btn); background:var(--card-bg); color:var(--text-primary); }
        .btn-primary { background:var(--accent); color:white; border:none; }
        .user-area { display:flex; align-items:center; gap:8px; background:var(--card-bg); padding:4px 12px; border-radius:40px; border:1px solid var(--border-btn); }
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2rem; }
        .stat-card { background:var(--card-bg); border-radius:1.2rem; padding:1rem; text-align:center; border:1px solid var(--border-light); box-shadow:0 2px 6px rgba(0,0,0,0.05); }
        .stat-number { font-size:2rem; font-weight:700; color:var(--accent); }
        .progress-bg { background:var(--progress-bg); height:8px; border-radius:12px; margin:0.5rem 0; }
        .progress-fill { background:var(--progress-fill); height:8px; border-radius:12px; width:0%; }
        .mission-card, .ai-card { background:var(--card-bg); border-radius:1.5rem; padding:1rem; margin-bottom:1.5rem; border:1px solid var(--border-light); }
        .search-filter { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
        .search-filter input, .search-filter select { padding:0.5rem 1rem; border-radius:40px; background:var(--card-bg); border:1px solid var(--border-btn); color:var(--text-primary); flex:1; }
        .player-container { background:var(--player-bg); border-radius:1.5rem; padding:1rem; margin-bottom:2rem; display:none; }
        .player-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; color:var(--player-text); }
        #ytFrame { aspect-ratio:16/9; border-radius:1rem; overflow:hidden; }
        .video-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.5rem; margin-top:1rem; }
        .video-card { background:var(--card-bg); border-radius:1.2rem; overflow:hidden; cursor:pointer; border:1px solid var(--border-light); transition:0.2s; }
        .video-card:hover { transform:translateY(-4px); box-shadow:0 12px 20px rgba(0,0,0,0.1); }
        .thumb { position:relative; aspect-ratio:16/9; background:#000; }
        .thumb img { width:100%; height:100%; object-fit:cover; }
        .info { padding:0.8rem; }
        .video-title { font-weight:600; font-size:0.9rem; margin-bottom:0.5rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .progress-bar-sm { background:var(--progress-bg); height:4px; border-radius:4px; margin:8px 0; }
        .progress-fill-sm { background:var(--progress-fill); height:4px; border-radius:4px; width:0%; }
        .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem; }
        .gemini-chat { margin-top:1rem; background:var(--card-bg); border-radius:1rem; padding:0.8rem; }
        .chat-messages { max-height:200px; overflow-y:auto; margin-bottom:0.5rem; font-size:0.8rem; }
        .chat-input { display:flex; gap:0.5rem; }
        .chat-input input { flex:1; padding:0.5rem; border-radius:40px; border:1px solid var(--border-btn); background:var(--card-bg); color:var(--text-primary); }
        .error-msg { background:var(--error-bg); color:var(--error-text); padding:0.6rem; border-radius:40px; text-align:center; margin-bottom:1rem; display:none; }
        @media (max-width:700px){ .stats-grid { grid-template-columns:repeat(2,1fr); } .main-content { padding-left:20px; } }
    </style>
</head>
<body>
<button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
<div class="drawer" id="drawer">
    <div class="drawer-header"><button class="close-drawer" id="closeDrawerBtn">&times;</button></div>
    <div class="card"><h3>🏆 লিডারবোর্ড</h3><div id="leaderboardTable"></div></div>
    <div class="card"><h3>📅 অ্যাক্টিভিটি ক্যালেন্ডার</h3><div id="calendarGrid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px;"></div></div>
    <div class="card"><h3>🎖️ ব্যাজ</h3><div id="badgeList" style="display:flex; flex-wrap:wrap; gap:8px;"></div><p>⭐ লেভেল: <span id="userLevel">1</span> | 🔥 স্ট্রিক: <span id="streakDisplay">0</span> | 💯 পয়েন্ট: <span id="pointsDisplay">0</span></p></div>
</div>
<div class="overlay" id="overlay"></div>

<div class="main-content">
    <div class="top-header">
        <div class="logo"><h1>🎓 আলটিমেট ট্র্যাকার + জেমিনাই এআই</h1><p>@classofphysics</p></div>
        <div class="header-buttons">
            <div class="user-area"><span>👤</span><select id="userSelect"></select><button id="newUserBtn" class="btn">+ নতুন</button></div>
            <button id="themeToggleBtn" class="btn">🌙 ডার্ক মোড</button>
            <button id="syncBtn" class="btn btn-primary">⟳ সিঙ্ক</button>
            <button id="voiceBtn" class="btn">🎙️ ভয়েস</button>
            <button id="resetAllBtn" class="btn">🗑️ রিসেট</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalVideos">0</div><div>মোট ভিডিও</div></div>
        <div class="stat-card"><div class="stat-number" id="watchedVideos">0</div><div>দেখা হয়েছে</div></div>
        <div class="stat-card"><div class="stat-number" id="remainingVideos">0</div><div>বাকি</div></div>
        <div class="stat-card"><div class="stat-number" id="progressPercent">0%</div><div>অগ্রগতি</div></div>
    </div>

    <div class="mission-card">
        <h3>🎯 বর্তমান মিশন</h3>
        <div><span id="missionLabel"></span></div>
        <div class="progress-bg"><div id="missionProgressFill" class="progress-fill"></div></div>
        <div id="missionDesc"></div>
        <button id="nextMissionBtn" class="btn btn-primary" style="display:none;">➡ পরবর্তী মিশন</button>
    </div>

    <div class="ai-card">
        <h3>🤖 জেমিনাই এআই – আপনার পড়ার সঙ্গী</h3>
        <div class="gemini-chat">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="ভিডিও সম্পর্কে প্রশ্ন করুন...">
                <button id="sendChatBtn" class="btn">পাঠান</button>
            </div>
        </div>
    </div>

    <div class="search-filter">
        <input type="text" id="searchInput" placeholder="🔍 ভিডিও সার্চ...">
        <select id="filterSelect"><option value="all">সব</option><option value="unseen">দেখা হয়নি</option><option value="partial">আধা দেখা</option><option value="done">সম্পন্ন</option><option value="new">নতুন</option></select>
    </div>

    <div id="playerSection" class="player-container">
        <div class="player-header"><span id="playingTitle">—</span><button id="playerNoteBtn" class="btn">📓 নোট</button></div>
        <div id="ytFrame"></div>
        <div style="display:flex; justify-content:space-between; margin-top:0.8rem;"><button id="nextBtn" class="btn">▶ পরের ভিডিও</button><span id="nextHint"></span></div>
    </div>

    <div id="errorBox" class="error-msg"></div>
    <div id="videoGrid" class="video-grid"></div>
</div>

<div id="noteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1100;">
    <div style="background:var(--card-bg); border-radius:1.5rem; padding:1.5rem; width:90%; max-width:500px;">
        <h3>📌 ভিডিও নোট</h3>
        <input type="url" id="noteLink" placeholder="Google Drive লিংক" style="width:100%; margin:8px 0; padding:8px;">
        <textarea id="noteText" rows="3" placeholder="টেক্সট নোট..." style="width:100%; margin:8px 0; padding:8px;"></textarea>
        <div style="display:flex; gap:0.8rem;"><button id="saveNoteBtn" class="btn btn-primary">সংরক্ষণ</button><button id="closeNoteBtn" class="btn">বাতিল</button></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // ------------------- কনফিগার -------------------
    const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY";  // 👈 আপনার জেমিনাই API কী এখানে বসান
    const YT_API_KEY = 'AIzaSyDV7KTjAa1F5YFqoZNCa7mBk2jWe6Ki5lA';
    const CHANNEL_ID = 'UC4Z3GRWMIG-ybJ_yCppP8dA';
    const BATCH_SIZE = 10;
    
    // গ্লোবাল ভেরিয়েবল
    let videos = [], allUsersData = {}, currentUser = "", currentProgress = {}, currentNotes = {};
    let currentIdx = -1, ytPlayer = null, ytReady = false, pendingVideo = null, trackInterval = null, newIds = new Set();
    let currentBatch = 0;
    
    // জেমিনাই চ্যাট ইতিহাস
    let chatHistory = [];
    
    // হ্যামবার্গার
    document.getElementById('hamburgerBtn').onclick = () => { document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('active'); };
    document.getElementById('closeDrawerBtn').onclick = () => { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); };
    document.getElementById('overlay').onclick = () => { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); };
    
    // নিরাপদ টেক্সট ফাংশন
    function setText(id, text) { let el = document.getElementById(id); if(el) el.innerText = text; }
    function setHtml(id, html) { let el = document.getElementById(id); if(el) el.innerHTML = html; }
    function setStyle(id, prop, val) { let el = document.getElementById(id); if(el) el.style[prop] = val; }
    
    // ইউজার ডাটা ফাংশন
    function initUser(u) { if(!allUsersData[u]) allUsersData[u] = { progress:{}, notes:{}, completedDates:[], points:0, streak:0, lastRewardDate:null, todayCompletedVideos:[], badges:[], level:1, weeklyChallenge:false }; }
    function loadAll() { let d = localStorage.getItem('physics_all_users_v8'); if(d) allUsersData = JSON.parse(d); else allUsersData = {}; }
    function saveAll() { localStorage.setItem('physics_all_users_v8', JSON.stringify(allUsersData)); }
    function refreshUserList() { let sel = document.getElementById('userSelect'); if(sel) { sel.innerHTML = ''; Object.keys(allUsersData).forEach(u => { let opt = document.createElement('option'); opt.value = u; opt.innerText = u; sel.appendChild(opt); }); } }
    function addNewUser() { let name = prompt("নতুন ইউজারের নাম:"); if(name && !allUsersData[name]) { allUsersData[name] = { progress:{}, notes:{}, completedDates:[], points:0, streak:0, lastRewardDate:null, todayCompletedVideos:[], badges:[], level:1, weeklyChallenge:false }; saveAll(); refreshUserList(); document.getElementById('userSelect').value = name; switchUser(); } }
    function switchUser() { currentUser = document.getElementById('userSelect').value; initUser(currentUser); currentProgress = allUsersData[currentUser].progress || {}; currentNotes = allUsersData[currentUser].notes || {}; updateAllUI(); if(ytPlayer) ytPlayer.stopVideo(); document.getElementById('playerSection').style.display = 'none'; currentIdx = -1; }
    
    // রিওয়ার্ড ও ব্যাজ
    function getToday() { return new Date().toISOString().slice(0,10); }
    function grantBadge(badgeName) { if(!badgeName) return; let u = allUsersData[currentUser]; if(!u.badges.includes(badgeName)) { u.badges.push(badgeName); saveAll(); updateAllUI(); } }
    function updateLevelAndPoints() { let u = allUsersData[currentUser]; let newLevel = Math.floor(u.points/10)+1; if(newLevel > u.level) { u.level = newLevel; grantBadge(`⭐ লেভেল ${u.level}`); } u.level = newLevel; saveAll(); }
    function updateStreakAndReward(videoId) { let u = allUsersData[currentUser]; if((currentProgress[videoId]||0)>=100 && !u.todayCompletedVideos.includes(videoId)) { u.todayCompletedVideos.push(videoId); if(u.todayCompletedVideos.length===1) { u.points += 1; updateLevelAndPoints(); let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1); let yStr = yesterday.toISOString().slice(0,10); if(u.lastRewardDate === yStr) u.streak += 1; else u.streak = 1; u.lastRewardDate = getToday(); if(!u.completedDates.includes(getToday())) u.completedDates.push(getToday()); if(u.streak>=7) grantBadge("🔥 স্ট্রিক যোদ্ধা"); canvasConfetti({particleCount:100, spread:60}); saveAll(); updateAllUI(); } } }
    function updateMaxProgress(videoId, newPercent) { let old = currentProgress[videoId]||0; if(newPercent > old) { currentProgress[videoId] = newPercent; allUsersData[currentUser].progress = currentProgress; saveAll(); updateAllUI(); if(newPercent>=100 && old<100) updateStreakAndReward(videoId); if(currentIdx!==-1 && videos[currentIdx] && videos[currentIdx].id===videoId) updatePlayerNoteButton(videoId); } }
    
    // UI আপডেট
    function updateStats() { let total=videos.length, done=videos.filter(v=>(currentProgress[v.id]||0)>=100).length, pct=total?Math.round(done/total*100):0; setText('totalVideos',total); setText('watchedVideos',done); setText('remainingVideos',total-done); setText('progressPercent',pct+'%'); setText('pointsDisplay',allUsersData[currentUser]?.points||0); setText('streakDisplay',allUsersData[currentUser]?.streak||0); setText('userLevel',allUsersData[currentUser]?.level||1); }
    function updateMission() { if(!videos.length) return; let start=currentBatch*BATCH_SIZE, end=Math.min(start+BATCH_SIZE, videos.length); let batch=videos.slice(start,end); let completed=batch.filter(v=>(currentProgress[v.id]||0)>=100).length; let percent=(completed/batch.length)*100; setStyle('missionProgressFill','width',percent+'%'); setText('missionLabel',`মিশন: ভিডিও ${start+1} - ${end}`); let descDiv=document.getElementById('missionDesc'); let nextBtn=document.getElementById('nextMissionBtn'); if(completed===batch.length && end<videos.length){ if(descDiv) descDiv.innerHTML='🎉 মিশন সম্পন্ন! পরবর্তী মিশন আনলক'; if(nextBtn) nextBtn.style.display='inline-block'; if(nextBtn) nextBtn.onclick=()=>{ currentBatch++; saveAll(); updateMission(); renderGrid(); }; } else { if(descDiv) descDiv.innerHTML=`অগ্রগতি: ${completed}/${batch.length}`; if(nextBtn) nextBtn.style.display='none'; } }
    function updateLeaderboard() { let arr=Object.entries(allUsersData).map(([n,d])=>({name:n, points:d.points||0, totalVideos:videos.filter(v=>(d.progress?.[v.id]||0)>=100).length})); arr.sort((a,b)=>b.points-a.points); let html='<table style="width:100%"><tr><th>র্যাঙ্ক</th><th>ইউজার</th><th>পয়েন্ট</th><th>ভিডিও</th></tr>'; arr.forEach((u,i)=>{ html+=`<tr><td>${i+1}</td><td>${u.name}</td><td>${u.points}</td><td>${u.totalVideos}</td></tr>`; }); setHtml('leaderboardTable',html); }
    function updateCalendar() { let u=allUsersData[currentUser]; let dates=u.completedDates||[]; let today=new Date(); let year=today.getFullYear(), month=today.getMonth(); let firstDay=new Date(year,month,1).getDay(); let days=new Date(year,month+1,0).getDate(); let html=''; for(let i=0;i<firstDay;i++) html+='<div class="calendar-day"></div>'; for(let d=1;d<=days;d++){ let ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; let cls=dates.includes(ds)?'completed':''; html+=`<div class="calendar-day ${cls}" style="background:${cls?'var(--progress-fill)':'var(--progress-bg)'}; border-radius:8px; padding:4px; text-align:center;">${d}</div>`; } setHtml('calendarGrid',html); }
    function updateBadges() { let u=allUsersData[currentUser]; let badges=u.badges||[]; let badgeHtml=''; let allBadges=['🔥 স্ট্রিক যোদ্ধা','🎯 মিশন মাস্টার','📝 নোট রাজা','🏆 সাপ্তাহিক চ্যালেঞ্জ মাস্টার']; allBadges.forEach(b=>{ if(badges.includes(b)) badgeHtml+=`<span class="badge" style="background:var(--accent); color:white; border-radius:40px; padding:4px 12px;">${b}</span>`; }); if(!badgeHtml) badgeHtml='<span>এখনো ব্যাজ নেই</span>'; setHtml('badgeList',badgeHtml); }
    function updateAllUI() { updateStats(); updateMission(); renderGrid(); updateLeaderboard(); updateCalendar(); updateBadges(); }
    
    // জেমিনাই এআই চ্যাট ফাংশন
    async function callGemini(prompt, contextVideoTitle = "") {
        if(!GEMINI_API_KEY || GEMINI_API_KEY === "YOUR_GEMINI_API_KEY") { return "জেমিনাই API কী বসাননি। প্রথমে API key যোগ করুন।"; }
        let fullPrompt = contextVideoTitle ? `বর্তমান ভিডিও: "${contextVideoTitle}"\n${prompt}` : prompt;
        try {
            let response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
            });
            let data = await response.json();
            if(data.error) return `জেমিনাই error: ${data.error.message}`;
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "কোনো উত্তর পাইনি।";
        } catch(e) { return "নেটওয়ার্ক সমস্যা: "+e.message; }
    }
    async function sendChatMessage() {
        let input = document.getElementById('chatInput').value.trim();
        if(!input) return;
        let currentVideoTitle = (currentIdx>=0 && videos[currentIdx]) ? videos[currentIdx].title : "কোনো ভিডিও খোলা নেই";
        let chatDiv = document.getElementById('chatMessages');
        chatDiv.innerHTML += `<div><strong>আপনি:</strong> ${input}</div>`;
        document.getElementById('chatInput').value = '';
        let reply = await callGemini(input, currentVideoTitle);
        chatDiv.innerHTML += `<div><strong>জেমিনাই:</strong> ${reply}</div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    
    // গ্রিড রেন্ডার
    function renderGrid() { if(!videos.length){ setHtml('videoGrid','<div style="text-align:center;">সিঙ্ক করুন</div>'); return; } let q=document.getElementById('searchInput')?.value.toLowerCase()||''; let filter=document.getElementById('filterSelect')?.value||'all'; let filtered=videos.filter(v=>{ let pct=currentProgress[v.id]||0; if(filter==='unseen' && pct>0) return false; if(filter==='partial' && (pct===0||pct>=100)) return false; if(filter==='done' && pct<100) return false; if(filter==='new' && !newIds.has(v.id)) return false; if(q && !v.title.toLowerCase().includes(q)) return false; return true; }); let html=''; filtered.forEach(v=>{ let pct=currentProgress[v.id]||0; let isNew=newIds.has(v.id); let hasNote=!!(currentNotes[v.id] && (currentNotes[v.id].link || currentNotes[v.id].text)); let idx=videos.findIndex(x=>x.id===v.id); html+=`<div class="video-card" data-idx="${idx}"><div class="thumb"><img src="${v.thumb}" loading="lazy"><span class="video-number">${idx+1}</span>${isNew?'<span class="new-tag" style="position:absolute; top:8px; right:8px; background:#f97316; color:white; padding:2px 8px; border-radius:30px;">🆕</span>':''}${pct>=100?'<div class="done-overlay" style="position:absolute; inset:0; background:rgba(46,204,113,0.85); display:flex; align-items:center; justify-content:center;">✓ সম্পন্ন</div>':''}</div><div class="info"><div class="video-title">${escapeHtml(v.title)}</div><div class="progress-bar-sm"><div class="progress-fill-sm" style="width:${pct}%"></div></div><div class="card-footer"><span>${pct}%</span><button class="note-btn-sm" data-vid="${v.id}" style="background:var(--reward-bg); border:none; border-radius:30px; padding:2px 8px;">${hasNote?'📄':'📎'}</button></div></div></div>`; }); setHtml('videoGrid',html); document.querySelectorAll('.video-card').forEach(card=>{ let idx=parseInt(card.dataset.idx); card.addEventListener('click',(e)=>{ if(e.target.classList.contains('note-btn-sm')) return; playVideo(idx); }); let btn=card.querySelector('.note-btn-sm'); if(btn) btn.addEventListener('click',(e)=>{ e.stopPropagation(); openNoteModal(btn.dataset.vid); }); }); }
    
    // নোট
    let currentNoteVideoId=null;
    function openNoteModal(vid){ currentNoteVideoId=vid; let note=currentNotes[vid]||{link:'',text:''}; document.getElementById('noteLink').value=note.link||''; document.getElementById('noteText').value=note.text||''; document.getElementById('noteModal').style.display='flex'; }
    function closeModal(){ document.getElementById('noteModal').style.display='none'; currentNoteVideoId=null; }
    function saveCurrentNote(){ if(currentNoteVideoId){ let link=document.getElementById('noteLink').value.trim(); let text=document.getElementById('noteText').value; currentNotes[currentNoteVideoId]={link,text}; allUsersData[currentUser].notes=currentNotes; saveAll(); renderGrid(); if(currentIdx!==-1 && videos[currentIdx] && videos[currentIdx].id===currentNoteVideoId) updatePlayerNoteButton(currentNoteVideoId); } closeModal(); }
    function updatePlayerNoteButton(vid){ let note=currentNotes[vid]; let btn=document.getElementById('playerNoteBtn'); if(!btn) return; if(note && (note.link||note.text)){ btn.innerText='📓 ওপেন নোট'; btn.onclick=()=>{ alert(`লিংক: ${note.link||'না'}\nটেক্সট: ${note.text||'না'}`); }; } else { btn.innerText='➕ নোট যোগ করুন'; btn.onclick=()=>openNoteModal(vid); } }
    
    // প্লেয়ার
    function buildPlayer(vid){ let frame=document.getElementById('ytFrame'); if(!frame) return; frame.innerHTML=''; ytPlayer=new YT.Player('ytFrame',{videoId:vid,width:'100%',height:'100%',playerVars:{autoplay:1,rel:0},events:{onStateChange:e=>{ if(e.data===YT.PlayerState.PLAYING){ if(trackInterval) clearInterval(trackInterval); trackInterval=setInterval(()=>{ if(!ytPlayer) return; let cur=ytPlayer.getCurrentTime(),dur=ytPlayer.getDuration(); if(dur>0){ let p=Math.floor((cur/dur)*100); if(p>95) p=100; updateMaxProgress(vid,p); } },4000); } else if(e.data===YT.PlayerState.ENDED){ updateMaxProgress(vid,100); setTimeout(()=>playNext(),2000); } },onError:()=>showError("ভিডিও লোড সমস্যা")}}); }
    function playVideo(idx){ if(idx<0||idx>=videos.length) return; currentIdx=idx; let v=videos[idx]; document.getElementById('playerSection').style.display='block'; setText('playingTitle',`${idx+1}. ${v.title}`); setText('nextHint',videos[idx+1]?`পরের: ${videos[idx+1].title.slice(0,60)}`:'শেষ'); updatePlayerNoteButton(v.id); if(ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(v.id); else if(ytReady) buildPlayer(v.id); else pendingVideo=v.id; window.scrollTo({top:0,behavior:'smooth'}); }
    function playNext(){ if(currentIdx+1<videos.length) playVideo(currentIdx+1); else alert('সব ভিডিও শেষ!'); }
    
    // সিঙ্ক ও ইউটিউব
    async function getUploadsPlaylistId(){ let res=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${YT_API_KEY}`); let data=await res.json(); if(data.error) throw new Error(data.error.message); return data.items[0].contentDetails.relatedPlaylists.uploads; }
    async function fetchAllVideos(plId){ let list=[], pt=''; do{ let url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${plId}&key=${YT_API_KEY}${pt?'&pageToken='+pt:''}`; let res=await fetch(url); let d=await res.json(); if(d.error) throw new Error(d.error.message); (d.items||[]).forEach(it=>{ let title=it.snippet.title; if(title!=='Private video' && title!=='Deleted video') list.push({id:it.snippet.resourceId.videoId,title,thumb:it.snippet.thumbnails?.medium?.url||''}); }); pt=d.nextPageToken; }while(pt); list.reverse(); return list; }
    async function syncVideos(){ let btn=document.getElementById('syncBtn'); if(btn){ btn.disabled=true; btn.innerText='⏳'; } try{ let plId=await getUploadsPlaylistId(); let fresh=await fetchAllVideos(plId); let oldIds=new Set(videos.map(v=>v.id)); newIds.clear(); fresh.forEach(v=>{if(!oldIds.has(v.id)) newIds.add(v.id);}); videos=fresh; localStorage.setItem('physics_videos_cache',JSON.stringify(videos)); updateAllUI(); if(newIds.size) alert(`${newIds.size} টি নতুন ভিডিও!`); }catch(err){ showError(err.message); } finally{ if(btn){ btn.disabled=false; btn.innerText='⟳ সিঙ্ক'; } } }
    function resetAll(){ if(confirm("সব ডাটা রিসেট?")){ allUsersData={}; saveAll(); refreshUserList(); addNewUser(); switchUser(); } }
    function showError(msg){ let box=document.getElementById('errorBox'); if(box){ box.innerText=msg; box.style.display='block'; setTimeout(()=>box.style.display='none',5000); } }
    function escapeHtml(str){ return str.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // ভয়েস কমান্ড
    document.getElementById('voiceBtn')?.addEventListener('click',()=>{ let SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SpeechRecognition){ alert("ভয়েস সাপোর্ট নেই"); return; } let rec=new SpeechRecognition(); rec.lang='bn-BD'; rec.onresult=(e)=>{ let cmd=e.results[0][0].transcript.toLowerCase(); if(cmd.includes('next')) playNext(); else if(cmd.includes('pause')) ytPlayer?.pauseVideo(); else if(cmd.includes('play')) ytPlayer?.playVideo(); else alert("কমান্ড বুঝলাম না"); }; rec.start(); });
    
    window.onYouTubeIframeAPIReady=()=>{ ytReady=true; if(pendingVideo){ buildPlayer(pendingVideo); pendingVideo=null; } };
    document.getElementById('syncBtn')?.addEventListener('click',syncVideos);
    document.getElementById('resetAllBtn')?.addEventListener('click',resetAll);
    document.getElementById('nextBtn')?.addEventListener('click',playNext);
    document.getElementById('newUserBtn')?.addEventListener('click',addNewUser);
    document.getElementById('userSelect')?.addEventListener('change',switchUser);
    document.getElementById('themeToggleBtn')?.addEventListener('click',()=>{ document.body.classList.toggle('dark'); localStorage.setItem('physics_theme',document.body.classList.contains('dark')?'dark':'light'); let btn=document.getElementById('themeToggleBtn'); if(btn) btn.innerText=document.body.classList.contains('dark')?'☀️ লাইট মোড':'🌙 ডার্ক মোড'; });
    document.getElementById('searchInput')?.addEventListener('input',renderGrid);
    document.getElementById('filterSelect')?.addEventListener('change',renderGrid);
    document.getElementById('saveNoteBtn')?.addEventListener('click',saveCurrentNote);
    document.getElementById('closeNoteBtn')?.addEventListener('click',closeModal);
    document.getElementById('sendChatBtn')?.addEventListener('click',sendChatMessage);
    document.getElementById('chatInput')?.addEventListener('keypress',(e)=>{ if(e.key==='Enter') sendChatMessage(); });
    
    if(localStorage.getItem('physics_theme')==='dark'){ document.body.classList.add('dark'); let btn=document.getElementById('themeToggleBtn'); if(btn) btn.innerText='☀️ লাইট মোড'; }
    loadAll(); if(!Object.keys(allUsersData).length) addNewUser(); else refreshUserList(); switchUser(); let cached=localStorage.getItem('physics_videos_cache'); if(cached){ videos=JSON.parse(cached); updateAllUI(); } syncVideos();
</script>
</body>
